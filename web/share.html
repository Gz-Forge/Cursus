<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #121212;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .heart {
      font-size: 90px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
    }

    .message {
      color: #ffffff;
      font-size: 22px;
      font-weight: 600;
      margin-top: 28px;
      text-align: center;
      padding: 0 24px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.9s forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0);   opacity: 0; }
      60%  { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeUp {
      0%   { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="heart">❤️</div>
  <div class="message">Gracias por compartir Cursus.</div>

  <script>
    var PLAY_STORE = 'https://play.google.com/store/apps/details?id=TU_APP_ID';
    var APP_STORE  = 'https://apps.apple.com/app/id/TU_APP_ID';

    setTimeout(function () {
      var ua = navigator.userAgent || '';
      if (/iPad|iPhone|iPod/.test(ua)) {
        window.location.href = APP_STORE;
      } else {
        // Android y cualquier otro sistema → Play Store
        window.location.href = PLAY_STORE;
      }
    }, 3000);
  </script>
</body>
</html>
